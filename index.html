<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Shopping Lists</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#2563eb;--accent-light:#eff6ff;--accent-dark:#1d4ed8;
  --bg:#ffffff;--surface:#f8f8f8;--border:#e8e8e8;--border-light:#f0f0f0;
  --text:#1a1a1a;--text-muted:#888;--text-light:#bbb;
  --danger:#e53e3e;--radius:10px;--sidebar-w:280px;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
.topbar-icon{width:26px;height:26px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px}
.topbar-title{font-size:.9rem;font-weight:600;color:var(--text);letter-spacing:.01em}
.topbar-spacer{flex:1}
.topbar-count{font-size:.75rem;color:var(--text-muted);background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:2px 9px}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:var(--sidebar-w);border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg);flex-shrink:0}
.sidebar-header{padding:14px 16px 10px;border-bottom:1px solid var(--border-light)}
.btn-new{width:100%;padding:9px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:.83rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;justify-content:center;transition:background .15s}
.btn-new:hover{background:var(--accent-dark)}
.sidebar-list{flex:1;overflow-y:auto;padding:8px}
.list-card{padding:11px 12px;border-radius:8px;cursor:pointer;border:1.5px solid transparent;margin-bottom:4px;transition:all .15s}
.list-card:hover{background:var(--surface);border-color:var(--border)}
.list-card.active{background:var(--accent-light);border-color:var(--accent)}
.lc-name{font-size:.84rem;font-weight:600;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lc-meta{font-size:.72rem;color:var(--text-muted)}
.lc-progress{margin-top:6px;height:3px;background:var(--border);border-radius:99px;overflow:hidden}
.lc-progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .3s}
.sidebar-empty{padding:32px 16px;text-align:center;color:var(--text-muted);font-size:.82rem;line-height:1.6}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.form-view{flex:1;display:flex;flex-direction:column;padding:28px 32px;max-width:720px;width:100%;margin:0 auto;overflow-y:auto}
.form-view h2{font-size:1.1rem;font-weight:700;margin-bottom:6px}
.form-view .sub{font-size:.82rem;color:var(--text-muted);margin-bottom:22px}
.form-row{margin-bottom:18px}
.form-row label{display:block;font-size:.78rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.form-row input{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:var(--radius);font-family:inherit;font-size:.85rem;color:var(--text);outline:none;transition:border-color .15s}
.form-row input:focus{border-color:var(--accent)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap}
.btn{padding:9px 18px;border-radius:var(--radius);font-size:.83rem;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-dark)}
.btn-ghost{background:transparent;color:var(--text-muted);border:1.5px solid var(--border)}.btn-ghost:hover{border-color:#aaa;color:var(--text)}
.btn-danger{background:transparent;color:var(--danger);border:1.5px solid var(--danger)}.btn-danger:hover{background:var(--danger);color:#fff}
.btn-accent-ghost{background:transparent;color:var(--accent);border:1.5px solid var(--accent)}.btn-accent-ghost:hover{background:var(--accent-light)}
.detail-view{flex:1;display:flex;flex-direction:column;overflow:hidden}
.detail-header{padding:18px 28px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px}
.detail-header .title-block{flex:1}
.detail-header h2{font-size:1.05rem;font-weight:700;margin-bottom:3px}
.detail-meta{font-size:.75rem;color:var(--text-muted)}
.detail-body{flex:1;overflow-y:auto;padding:22px 28px}
.add-item-row{display:flex;gap:8px;margin-bottom:20px}
.add-item-row input{flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius);font-family:inherit;font-size:.85rem;color:var(--text);outline:none;transition:border-color .15s}
.add-item-row input:focus{border-color:var(--accent)}
.add-item-row button{padding:9px 16px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:.83rem;font-weight:600;cursor:pointer;transition:background .15s;white-space:nowrap}
.add-item-row button:hover{background:var(--accent-dark)}
.items-list{list-style:none;padding:0}
.item-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border-light)}
.item-row:last-child{border-bottom:none}
.item-check{width:18px;height:18px;border:2px solid var(--border);border-radius:4px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.item-check.checked{background:var(--accent);border-color:var(--accent)}
.item-check.checked::after{content:'\2713';color:#fff;font-size:11px;font-weight:700}
.item-text{flex:1;font-size:.87rem;color:var(--text);transition:all .15s}
.item-text.checked{text-decoration:line-through;color:var(--text-light)}
.item-delete{width:24px;height:24px;border:none;background:none;cursor:pointer;color:var(--text-light);font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;border-radius:4px;transition:all .15s;opacity:0}
.item-row:hover .item-delete{opacity:1}
.item-delete:hover{color:var(--danger);background:rgba(229,62,62,.08)}
.section-label{font-size:.75rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text-muted);padding:40px}
.empty-icon{font-size:3rem;opacity:.4}
.empty-state h3{font-size:.95rem;font-weight:600;color:var(--text)}
.empty-state p{font-size:.82rem;text-align:center;line-height:1.6;max-width:280px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:99px;font-size:.82rem;font-weight:500;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:600px){.form-view{padding:20px 16px}.detail-header{padding:14px 16px 12px}.detail-body{padding:14px 16px}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-icon">&#128722;</div>
  <span class="topbar-title">My Shopping Lists</span>
  <div class="topbar-spacer"></div>
  <span class="topbar-count" id="countBadge">0 lists</span>
</div>
<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="btn-new" onclick="showNewForm()">&#65291; New List</button>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
  </div>
  <div class="main" id="main"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const LST_KEY='shopping_lists_v1';
let lists={},activeId=null,editingId=null;
function load(){try{var data=JSON.parse(localStorage.getItem(LST_KEY))||{};Object.keys(data).forEach(function(k){var l=data[k];if(l.items&&!Array.isArray(l.items)){l.items=Object.entries(l.items).map(function(e){var id=e[0],it=e[1];var txt=(it.qty&&it.qty>1?it.qty+'x ':'')+( it.name||it.text||'');return{id:id,text:txt.trim(),checked:!!(it.done||it.checked)};});}});return data;}catch(e){return{}}}
function save(){try{localStorage.setItem(LST_KEY,JSON.stringify(lists))}catch(e){}}
function lid(){return 'lst'+Date.now()+Math.random().toString(36).slice(2,6)}
function iid(){return 'itm'+Date.now()+Math.random().toString(36).slice(2,6)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function toast(msg,dur){dur=dur||2400;var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show')},dur)}
function itemStats(list){var items=Array.isArray(list.items)?list.items:Object.values(list.items||{});var total=items.length;var checked=items.filter(function(i){return i.checked||i.done}).length;return{total:total,checked:checked}}
function renderSidebar(){
  var listEl=document.getElementById('sidebarList');
  var entries=Object.entries(lists).sort(function(a,b){return(b[1].created||0)-(a[1].created||0)});
  document.getElementById('countBadge').textContent=entries.length+(entries.length===1?' list':' lists');
  if(!entries.length){listEl.innerHTML='<div class="sidebar-empty">No lists yet.<br>Click + New List to add one.</div>';return}
  listEl.innerHTML=entries.map(function(e){
    var id=e[0],l=e[1];
    var s=itemStats(l);
    var date=new Date(l.created).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    var pct=s.total?Math.round(s.checked/s.total*100):0;
    var meta=s.total?(s.checked+'/'+s.total+' done \xb7 '+date):('0 items \xb7 '+date);
    return '<div class="list-card'+(id===activeId?' active':'')+'" onclick="selectList(\''+id+'\')">'
      +'<div class="lc-name">'+esc(l.name||'Untitled List')+'</div>'
      +'<div class="lc-meta">'+meta+'</div>'
      +(s.total?'<div class="lc-progress"><div class="lc-progress-fill" style="width:'+pct+'%"></div></div>':'')
      +'</div>';
  }).join('');
}
function showNewForm(prefill){
  prefill=prefill||{};
  activeId=null;editingId=prefill.id||null;
  renderSidebar();
  document.getElementById('main').innerHTML=
    '<div class="form-view">'
    +'<h2>'+(prefill.id?'Rename List':'New List')+'</h2>'
    +'<p class="sub">Give your shopping list a name.</p>'
    +'<div class="form-row"><label>List Name</label>'
    +'<input type="text" id="listName" placeholder="e.g. Weekly Groceries" value="'+esc(prefill.name||'')+'" /></div>'
    +'<div class="btn-row">'
    +'<button class="btn btn-primary" onclick="saveList()">Save List</button>'
    +(prefill.id?'<button class="btn btn-ghost" onclick="selectList(\''+prefill.id+'\')">Cancel</button>':'<button class="btn btn-ghost" onclick="renderEmptyState()">Cancel</button>')
    +'</div></div>';
  document.getElementById('listName').focus();
}
function saveList(){
  var name=(document.getElementById('listName').value||'').trim();
  if(!name){toast('Please enter a list name');document.getElementById('listName').focus();return}
  var id=editingId||lid();
  var existing=lists[id]||{};
  lists[id]={id:id,name:name,items:existing.items||[],created:existing.created||Date.now(),updated:Date.now()};
  save();
  var wasEditing=!!editingId;
  activeId=id;editingId=null;
  renderSidebar();renderDetailView(id);
  toast(wasEditing?'List renamed':'✓ List created');
}
function selectList(id){activeId=id;renderSidebar();renderDetailView(id)}
function renderDetailView(id){
  var l=lists[id];
  if(!l){renderEmptyState();return}
  var items=l.items||[];
  var s=itemStats(l);
  var date=new Date(l.created).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'long',year:'numeric'});
  var unchecked=items.filter(function(i){return!i.checked});
  var checkedItems=items.filter(function(i){return i.checked});
  function renderItem(item){
    return '<li class="item-row">'
      +'<div class="item-check'+(item.checked?' checked':'')+'" onclick="toggleItem(\''+id+'\',\''+item.id+'\')"></div>'
      +'<span class="item-text'+(item.checked?' checked':'')+'">'+esc(item.text)+'</span>'
      +'<button class="item-delete" onclick="deleteItem(\''+id+'\',\''+item.id+'\')" title="Remove">\xd7</button>'
      +'</li>';
  }
  document.getElementById('main').innerHTML=
    '<div class="detail-view">'
    +'<div class="detail-header">'
    +'<div class="title-block"><h2>'+esc(l.name)+'</h2>'
    +'<div class="detail-meta">'+s.total+' item'+(s.total===1?'':'s')+' \xb7 '+s.checked+' checked \xb7 Created '+date+'</div></div>'
    +'<div class="btn-row">'
    +'<button class="btn btn-accent-ghost" onclick="showNewForm({id:\''+id+'\',name:'+JSON.stringify(l.name)+'})">&#9998; Rename</button>'
    +'<button class="btn btn-danger" onclick="deleteList(\''+id+'\')">Delete</button>'
    +'</div></div>'
    +'<div class="detail-body">'
    +'<div class="add-item-row">'
    +'<input type="text" id="newItemInput" placeholder="Add an item…" onkeydown="if(event.key===\'Enter\')addItem(\''+id+'\')">'
    +'<button onclick="addItem(\''+id+'\')">Add</button>'
    +'</div>'
    +(unchecked.length?'<div class="section-label">To get</div><ul class="items-list">'+unchecked.map(renderItem).join('')+'</ul>':'')
    +(checkedItems.length?'<div class="section-label" style="margin-top:'+(unchecked.length?'22px':'0')+'">Got it ✓</div><ul class="items-list">'+checkedItems.map(renderItem).join('')+'</ul>':'')
    +(!items.length?'<p style="color:var(--text-light);font-size:.83rem">No items yet — add one above.</p>':'')
    +'</div></div>';
  var ni=document.getElementById('newItemInput');
  ni.focus();
  // Attach library item autocomplete
  if(window.LibraryClient){
    LibraryClient.attachAutocomplete(ni,{type:'item',onSelect:function(i){ni.value=i.name;}});
  }
}
function addItem(listId){
  var input=document.getElementById('newItemInput');
  var text=(input.value||'').trim();
  if(!text)return;
  if(!lists[listId].items)lists[listId].items=[];
  lists[listId].items.push({id:iid(),text:text,checked:false});
  lists[listId].updated=Date.now();
  save();renderSidebar();renderDetailView(listId);
}
function toggleItem(listId,itemId){
  var item=(lists[listId].items||[]).find(function(i){return i.id===itemId});
  if(item){item.checked=!item.checked;lists[listId].updated=Date.now();save();renderSidebar();renderDetailView(listId)}
}
function deleteItem(listId,itemId){
  lists[listId].items=(lists[listId].items||[]).filter(function(i){return i.id!==itemId});
  lists[listId].updated=Date.now();
  save();renderSidebar();renderDetailView(listId);
}
function deleteList(id){
  if(!confirm('Delete "'+(lists[id]&&lists[id].name||'this list')+'"?'))return;
  delete lists[id];save();activeId=null;renderSidebar();renderEmptyState();toast('List deleted');
}
function renderEmptyState(){
  document.getElementById('main').innerHTML=
    '<div class="empty-state">'
    +'<div class="empty-icon">&#128722;</div>'
    +'<h3>No list selected</h3>'
    +'<p>Pick a list from the sidebar or click <strong>+ New List</strong> to get started.</p>'
    +'</div>';
}
function init(){
  lists=load();
  var entries=Object.entries(lists).sort(function(a,b){return(b[1].created||0)-(a[1].created||0)});
  renderSidebar();
  if(entries.length){activeId=entries[0][0];renderDetailView(activeId);renderSidebar()}
  else{showNewForm()}
}
init();
</script>
<script src="https://my-library-tan.vercel.app/library-client.js"></script>
</body>
</html>
